<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Trophy Room — Sports Trivia Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;600;700;800&family=Spectral:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0C1526;
  --panel:#111D33;
  --panel2:#16243E;
  --line:#243click456;
  --line:#24345A;
  --bone:#E9E4D8;
  --dim:#8FA0BC;
  --amber:#F5B841;
  --amber-dim:#B8862B;
  --teal:#3FBFB0;
  --coral:#E86A5E;
  --violet:#8F7BE8;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--navy);
  color:var(--bone);
  font-family:'Barlow Semi Condensed',Calibri,Arial,sans-serif;
  min-height:100vh;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(900px 420px at 70% -10%, rgba(245,184,65,.07), transparent 60%),
    radial-gradient(700px 500px at 0% 100%, rgba(63,191,176,.05), transparent 60%);
}
.wrap{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:28px 20px 64px}

/* ---------- header ---------- */
header{margin-bottom:34px}
.eyebrow{
  font-size:.68rem;font-weight:800;letter-spacing:.38em;text-transform:uppercase;
  color:var(--amber);margin-bottom:10px;
}
h1{
  font-family:'Spectral',Cambria,serif;font-weight:700;
  font-size:clamp(2rem,6vw,3.1rem);line-height:1.05;letter-spacing:.01em;
}
h1 span{color:var(--amber)}
.intro{margin-top:12px;color:var(--dim);font-size:1.02rem;font-weight:600;max-width:560px;line-height:1.5}

/* signature: field-strength divider */
.field-line{
  margin:26px 0 6px;height:24px;position:relative;overflow:hidden;
}
.field-line svg{width:100%;height:100%}
.field-line path{stroke:var(--amber-dim);stroke-width:1.5;fill:none;opacity:.7}

/* ---------- sections ---------- */
section{margin-top:34px}
.sec-head{display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
.sec-title{
  font-family:'Spectral',Cambria,serif;font-size:1.25rem;font-weight:700;letter-spacing:.02em;
}
.sec-rule{flex:1;height:1px;background:var(--line)}
.sec-count{font-size:.68rem;font-weight:800;letter-spacing:.2em;color:var(--dim);text-transform:uppercase}

.grid{display:grid;gap:14px}
@media(min-width:620px){.grid{grid-template-columns:1fr 1fr}}

.card{
  display:block;text-decoration:none;color:var(--bone);
  background:linear-gradient(180deg,var(--panel),#0E1930);
  border:1px solid var(--line);border-radius:14px;
  padding:18px 18px 16px;position:relative;overflow:hidden;
  transition:transform .15s ease, border-color .2s, box-shadow .2s;
}
.card::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--accent,var(--amber));opacity:.9;
}
.card:hover{
  transform:translateY(-3px);
  border-color:var(--accent,var(--amber));
  box-shadow:0 12px 28px rgba(0,0,0,.45);
}
.card:focus-visible{outline:2px solid var(--amber);outline-offset:3px}
.card-kind{
  font-size:.62rem;font-weight:800;letter-spacing:.24em;text-transform:uppercase;
  color:var(--accent,var(--amber));margin-bottom:6px;
}
.card-title{font-weight:800;font-size:1.12rem;letter-spacing:.01em;margin-bottom:5px}
.card-desc{color:var(--dim);font-weight:600;font-size:.92rem;line-height:1.45}
.card-go{
  position:absolute;right:14px;top:16px;color:var(--accent,var(--amber));
  font-weight:800;font-size:1rem;opacity:0;transform:translateX(-6px);
  transition:opacity .15s, transform .15s;
}
.card:hover .card-go{opacity:1;transform:none}

.empty{
  border:1px dashed var(--line);border-radius:14px;padding:18px;
  color:var(--dim);font-weight:600;font-size:.92rem;
}

footer{
  margin-top:48px;padding-top:18px;border-top:1px solid var(--line);
  color:var(--dim);font-size:.8rem;font-weight:600;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;
}
footer b{color:var(--bone)}

@media (prefers-reduced-motion: reduce){
  *{transition-duration:.001s !important}
}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Trivia · Games · Bragging Rights</div>
    <h1>The <span>Trophy</span> Room</h1>
    <p class="intro">Five sports trivia challenges — football, hoops, racing, golf, and an
      all-sports gauntlet. Pick your event, beat the clock, and claim the title.
      Everything runs right in your browser.</p>
    <div class="field-line" aria-hidden="true">
      <svg viewBox="0 0 960 24" preserveAspectRatio="none">
        <path d="M0,12 L340,12 Q352,12 356,4 Q362,-6 368,12 Q374,30 380,12 Q384,4 392,4 Q400,4 404,12 L960,12"/>
      </svg>
    </div>
  </header>

  <!-- Sections are built automatically from the TOOLS list below -->
  <main id="hub"></main>

  <footer>
    <span>Built &amp; maintained by <b>Rob</b> · For your entertainment!</span>
    <span id="year"></span>
  </footer>
</div>

<script>
/* ================================================================
   EDIT THIS LIST TO ADD OR REMOVE TOOLS — nothing else to change.

   kind:  the small label on the card
   title: the card headline
   desc:  one-line description
   url:   the link. For tools hosted in this same GitHub repo,
          just use the folder name, e.g. "trivia/" or "kspace/".
   section: which group it appears under
   accent (optional): a hex color for the card's edge + label
================================================================ */
const TOOLS = [
  {
    section:"Games & Challenges",
    kind:"Trivia · Football",
    title:"Gridiron Glory",
    desc:"20 questions on the NFL and college football — Super Bowls, Heismans, rivalries, and legends.",
    url:"https://roblay81.github.io/SportsTrivia/gridiron-glory.html",
    accent:"#2E6BFF"
  },
  {
    section:"Games & Challenges",
    kind:"Trivia · Basketball",
    title:"Hoops Havoc",
    desc:"20 questions on the NBA and March Madness — dynasties, buzzer-beaters, and Cinderella runs.",
    url:"https://roblay81.github.io/SportsTrivia/hoops-havoc.html",
    accent:"#FF7A00"
  },
  {
    section:"Games & Challenges",
    kind:"Trivia · Racing",
    title:"Full Throttle",
    desc:"20 questions on Formula 1 and NASCAR — champions, iconic tracks, and racing history.",
    url:"https://roblay81.github.io/SportsTrivia/full-throttle.html",
    accent:"#E10600"
  },
  {
    section:"Games & Challenges",
    kind:"Trivia · Golf",
    title:"The Clubhouse",
    desc:"20 questions on golf — the majors, the legends, and the language of the links.",
    url:"https://roblay81.github.io/SportsTrivia/the-clubhouse.html",
    accent:"#3E9B4F"
  },
  {
    section:"Games & Challenges",
    kind:"Trivia · All Sports",
    title:"Champions Mix",
    desc:"20 questions spanning all seven sports — the ultimate all-arounder test.",
    url:"https://roblay81.github.io/SportsTrivia/champions-mix.html",
    accent:"#F5B841"
  },
  /* --- Add your next tools by copying the block above. Examples: ---
  {
    section:"Physics Visualizers",
    kind:"Interactive Visualizer",
    title:"k-Space Explorer",
    desc:"See how k-space filling builds an image — sampling, resolution, and artifacts.",
    url:"kspace/",
    accent:"#3FBFB0"
  },
  {
    section:"Exam Prep",
    kind:"Question Bank",
    title:"MRSO Practice Exam",
    desc:"Domain-mapped safety questions with explanations and score tracking.",
    url:"mrso/",
    accent:"#8F7BE8"
  },
  {
    section:"Safety Tools",
    kind:"Training Tool",
    title:"FieldSight",
    desc:"MR safety education with an exposure simulator and interactive scanner anatomy.",
    url:"fieldsight/",
    accent:"#E86A5E"
  },
  ------------------------------------------------------------------ */
];

/* Preferred section order (sections only appear if they have tools) */
const SECTION_ORDER = ["Games & Challenges","Physics Visualizers","Exam Prep","Safety Tools"];

/* ---------- render ---------- */
const hub = document.getElementById("hub");
const groups = {};
TOOLS.forEach(t=>{ (groups[t.section] = groups[t.section] || []).push(t); });

const ordered = [...SECTION_ORDER.filter(s=>groups[s]),
                 ...Object.keys(groups).filter(s=>!SECTION_ORDER.includes(s))];

if(ordered.length === 0){
  hub.innerHTML = `<div class="empty">No tools listed yet — open this file and add entries to the TOOLS list at the top of the script.</div>`;
}

ordered.forEach(secName=>{
  const items = groups[secName];
  const sec = document.createElement("section");
  sec.innerHTML = `
    <div class="sec-head">
      <span class="sec-title">${secName}</span>
      <span class="sec-rule"></span>
      <span class="sec-count">${items.length} tool${items.length>1?"s":""}</span>
    </div>
    <div class="grid"></div>`;
  const grid = sec.querySelector(".grid");
  items.forEach(t=>{
    const a = document.createElement("a");
    a.className = "card";
    a.href = t.url;
    if(t.accent) a.style.setProperty("--accent", t.accent);
    a.innerHTML = `
      <div class="card-kind">${t.kind}</div>
      <div class="card-title">${t.title}</div>
      <div class="card-desc">${t.desc}</div>
      <span class="card-go" aria-hidden="true">→</span>`;
    grid.appendChild(a);
  });
  hub.appendChild(sec);
});

document.getElementById("year").textContent = new Date().getFullYear();
</script>
</body>
</html>
